version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pharos-postgres
    environment:
      POSTGRES_USER: pharos
      POSTGRES_PASSWORD: pharos123
      POSTGRES_DB: pharos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharos"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharos-backend
    environment:
      DATABASE_URL: postgresql://pharos:pharos123@postgres:5432/pharos
      SECRET_KEY: pharos-secret-key-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pharos-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
